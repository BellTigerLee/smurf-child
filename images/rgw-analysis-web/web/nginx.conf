server {
  listen 8080;
  server_name _;
  root /srv/viewer/current;
  index index.html;

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  location = /report.css {
    alias /opt/viewer/assets/report.css;
  }

  location = /favicon.svg {
    alias /opt/viewer/assets/favicon.svg;
  }

  location / {
    try_files $uri $uri/ /index.html =404;
  }
}
