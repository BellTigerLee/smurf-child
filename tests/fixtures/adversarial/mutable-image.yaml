apiVersion: apps/v1
kind: Deployment
metadata:
  name: mutable-image
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: mutable-image
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mutable-image
    spec:
      containers:
        - name: app
          image: ghcr.io/belltigerlee/smurf-child:latest
