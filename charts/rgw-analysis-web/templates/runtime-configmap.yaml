apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rgw-analysis-web.fullname" . }}-runtime
  labels:
    {{- include "rgw-analysis-web.labels" . | nindent 4 }}
    app.kubernetes.io/component: runtime
    scalex.io/component: runtime
data:
  S3_ENDPOINT_URL: {{ .Values.storage.endpointUrl | quote }}
  S3_BUCKET: {{ .Values.storage.bucket | quote }}
  AWS_DEFAULT_REGION: {{ .Values.storage.region | quote }}
  S3_WAIT_SECONDS: {{ .Values.storage.waitSeconds | quote }}
  S3_POLL_INTERVAL_SECONDS: {{ .Values.storage.pollIntervalSeconds | quote }}
