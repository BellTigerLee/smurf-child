name: Validate RED child contract

on:
  pull_request:
  push:
    branches-ignore:
      - main
      - ops

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install Python 3.13
        run: uv python install 3.13
      - name: Sync frozen environment
        run: |
          uv lock --check
          uv sync --frozen
      - name: Check formatting
        run: uv run --frozen ruff format --check .
      - name: Lint scaffold
        run: uv run --frozen ruff check .
      - name: Type-check scaffold
        run: uv run --frozen basedpyright
      - name: Test exact RED inventory verifier
        run: uv run --frozen pytest -q tests/test_red_contract_runner.py
      - name: Confirm complete expected RED inventory
        run: uv run --frozen smurf-child-red-contract
