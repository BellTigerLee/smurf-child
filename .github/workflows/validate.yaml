name: Validate RED child contract

on:
  pull_request:
  push:
    branches-ignore:
      - main
      - ops

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install Python 3.13
        run: uv python install 3.13
      - name: Sync frozen environment
        run: uv sync --frozen
      - name: Check formatting
        run: uv run --frozen ruff format --check .
      - name: Lint scaffold
        run: uv run --frozen ruff check .
      - name: Type-check scaffold
        run: uv run --frozen basedpyright
      - name: Confirm expected RED contract categories
        shell: bash
        run: |
          set +e
          output="$(uv run --frozen pytest -q tests/test_request_contract.py tests/test_manifest_contract.py tests/test_cli.py tests/test_red_fixtures.py 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$output"
          test "$status" -ne 0
          grep -q 'PLANNED_UNIMPLEMENTED:' <<<"$output"
